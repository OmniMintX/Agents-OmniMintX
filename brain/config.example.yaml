# Overmind config template.
# Copy to ~/.overmind/config.yaml and adjust.
# Every field can be overridden by an OVERMIND_* env var (shown in comments).

# AO daemon base URL (loopback).            env: OVERMIND_AO_BASE_URL
ao_base_url: http://127.0.0.1:3001

# Named LLM provider profiles (config v2). Declare as many as you like and
# point each role at one. api_key_env is the NAME of the env var holding the
# key, never the key itself.
providers:
  # Headless coding-agent CLI (reuses its stored auth — no API key needed).
  claude-cli:
    type: cli
    command: claude
    # Args placed before the prompt (prompt is appended as the last arg).
    args: ["-p", "--output-format", "json"]
    timeout_sec: 180
  # OpenAI-compatible samples — uncomment what you use:
  # openai:
  #   type: openai-compatible
  #   api_key_env: OPENAI_API_KEY        # base_url empty = https://api.openai.com/v1
  # deepseek:
  #   type: openai-compatible
  #   base_url: https://api.deepseek.com
  #   api_key_env: DEEPSEEK_API_KEY
  # ollama:
  #   type: openai-compatible
  #   base_url: http://localhost:11434/v1
  #   # local base_url needs no api_key_env
  # anthropic:
  #   type: anthropic
  #   api_key_env: ANTHROPIC_API_KEY

# Role → provider/model assignment. Each role can use a different provider.
roles:
  planner: { provider: claude-cli, model: "" }
  # verifier: { provider: deepseek, model: deepseek-chat }

# Legacy v1 single `llm` block is still accepted: it is auto-mapped to
# providers.default + roles.planner with a warning asking you to migrate.
# The old OVERMIND_LLM_* env vars keep working through that same path.

# SQLite database path.                      env: OVERMIND_DB_PATH
db_path: ~/.overmind/overmind.db

# Max sessions dispatched in parallel.       env: OVERMIND_MAX_PARALLEL
max_parallel: 3

# AO status poll interval (seconds).         env: OVERMIND_POLL_INTERVAL_SEC
poll_interval_sec: 15

# Per-task hard timeout (minutes).           env: OVERMIND_TASK_TIMEOUT_MIN
task_timeout_min: 45

# No-signal timeout before flagging a stalled task (minutes).
# env: OVERMIND_NO_SIGNAL_TIMEOUT_MIN
no_signal_timeout_min: 10

# Max verify-retry rounds per task (0 = fail immediately on verify fail).
# env: OVERMIND_MAX_VERIFY_ROUNDS
max_verify_rounds: 2
