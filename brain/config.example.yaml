# Overmind config template.
# Copy to ~/.overmind/config.yaml and adjust.
# Every field can be overridden by an OVERMIND_* env var (shown in comments).

# AO daemon base URL (loopback).            env: OVERMIND_AO_BASE_URL
ao_base_url: http://127.0.0.1:3001

# Planner LLM settings.
llm:
  # Provider: anthropic | openai | cli.      env: OVERMIND_LLM_PROVIDER
  # Empty = auto-detect: cli when cli_command is installed, else anthropic
  # when its API key env var is set.
  provider: ""
  model: claude-sonnet-4-5                   # env: OVERMIND_LLM_MODEL
  # Env var NAME holding the API key.        env: OVERMIND_LLM_API_KEY_ENV
  # Empty = ANTHROPIC_API_KEY (anthropic) / OPENAI_API_KEY (openai).
  api_key_env: ""
  # openai provider only: API base URL.      env: OVERMIND_LLM_BASE_URL
  # Empty = https://api.openai.com/v1. DeepSeek: https://api.deepseek.com
  # Ollama: http://localhost:11434/v1
  base_url: ""
  # cli provider: headless coding-agent CLI. env: OVERMIND_LLM_CLI_COMMAND
  cli_command: claude
  # Args placed before the prompt (prompt is appended as the last arg).
  cli_args: ["-p", "--output-format", "json"]
  # Subprocess timeout (seconds).            env: OVERMIND_LLM_CLI_TIMEOUT_SEC
  cli_timeout_sec: 180

# Filled-in samples for the openai provider (api_key_env is the NAME of the
# env var holding the key, never the key itself):
#
# OpenAI:
#   llm:
#     provider: openai
#     model: gpt-4o
#     api_key_env: OPENAI_API_KEY
#
# DeepSeek:
#   llm:
#     provider: openai
#     model: deepseek-chat
#     base_url: https://api.deepseek.com
#     api_key_env: DEEPSEEK_API_KEY
#
# Ollama (local):
#   llm:
#     provider: openai
#     model: llama3.1
#     base_url: http://localhost:11434/v1
#     api_key_env: OLLAMA_API_KEY

# SQLite database path.                      env: OVERMIND_DB_PATH
db_path: ~/.overmind/overmind.db

# Max sessions dispatched in parallel.       env: OVERMIND_MAX_PARALLEL
max_parallel: 3

# AO status poll interval (seconds).         env: OVERMIND_POLL_INTERVAL_SEC
poll_interval_sec: 15

# Per-task hard timeout (minutes).           env: OVERMIND_TASK_TIMEOUT_MIN
task_timeout_min: 45

# No-signal timeout before flagging a stalled task (minutes).
# env: OVERMIND_NO_SIGNAL_TIMEOUT_MIN
no_signal_timeout_min: 10
